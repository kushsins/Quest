services:
  postgres:
    image: postgres:16-alpine
    container_name: quest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quest
      POSTGRES_PASSWORD: quest
      POSTGRES_DB: quest
    ports:
      - "5433:5432"
    volumes:
      - quest_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quest -d quest"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  quest_postgres_data:
